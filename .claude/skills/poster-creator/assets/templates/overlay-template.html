<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{活动名称}} - 海报</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #000;
        }

        .poster {
            width: 1440px;
            height: 2560px;
            position: relative;
            overflow: hidden;
        }

        .poster-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 底部信息区域 - 与自然过渡的背景融合 */
        .footer-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 280px;
            background: linear-gradient(to top, rgba(10,10,20,0.95) 0%, rgba(10,10,20,0.7) 60%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 60px 60px 60px;
        }

        /* 时间地点 - 放大字号，清晰易读 */
        .event-meta {
            text-align: center;
            margin-bottom: 30px;
        }

        .event-date {
            font-size: 48px;
            font-weight: 700;
            color: #00d4ff;
            letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            margin-bottom: 16px;
        }

        .event-location .venue {
            font-size: 36px;
            color: rgba(255,255,255,0.95);
            letter-spacing: 3px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .event-location .address {
            font-size: 24px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }

        /* 主办方 - 放大字号 */
        .organizers {
            display: flex;
            justify-content: center;
            gap: 80px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 30px;
        }

        .org-item {
            text-align: center;
        }

        .org-label {
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
            margin-bottom: 12px;
            font-weight: 400;
        }

        .org-name {
            font-size: 24px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 2px;
            line-height: 1.6;
            font-weight: 500;
        }

        .hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="poster">
    <img class="poster-bg" src="底图.png" alt="底图">

    <div class="footer-overlay">
        <!-- 时间地点 -->
        <div class="event-meta">
            <div class="event-date">{{时间}}</div>
            <div class="event-location">
                <div class="venue">{{地点名称}}</div>
                <div class="address">{{详细地址}}</div>
            </div>
        </div>

        <!-- 主办方 -->
        <div class="organizers">
            <div class="org-item">
                <div class="org-label">主办单位</div>
                <div class="org-name">{{主办方}}</div>
            </div>
            <div class="org-item">
                <div class="org-label">支持单位</div>
                <div class="org-name">{{支持单位}}</div>
            </div>
            <div class="org-item">
                <div class="org-label">承办单位</div>
                <div class="org-name">{{承办方}}</div>
            </div>
        </div>
    </div>
</div>

<div class="hint">F11 全屏 → 截图导出</div>

</body>
</html>
